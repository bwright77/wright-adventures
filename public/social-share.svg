<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#002035"/>
      <stop offset="100%" stop-color="#004667"/>
    </linearGradient>
    <radialGradient id="glowBR" cx="1" cy="1" r="1">
      <stop offset="0%" stop-color="#009DD6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#009DD6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowTL" cx="0" cy="0" r="1">
      <stop offset="0%" stop-color="#4A7C59" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4A7C59" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="clip">
      <rect width="1200" height="630"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle radial glows -->
  <ellipse cx="1200" cy="630" rx="700" ry="550" fill="url(#glowBR)" clip-path="url(#clip)"/>
  <ellipse cx="0" cy="0" rx="500" ry="400" fill="url(#glowTL)" clip-path="url(#clip)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="5" fill="#009DD6"/>

  <!-- Logo mark — centered in left column (x: 60–340, y: 100–530)
       Original viewBox 500x500, scale 0.44 → 220x220
       Center at (200, 315): translate(200 - 250*0.44, 315 - 280*0.44) = translate(90, 191.8)
  -->
  <g transform="translate(90, 192) scale(0.44)" opacity="0.95">
    <!-- River blue: mountain/arrow top -->
    <polygon fill="#009DD6" points="250.56 50 166.79 219.38 199.18 280.25 251.12 218.85 301.91 280.25 333.21 218.26 250.56 50"/>
    <!-- White: body/wings (was navy, inverted for dark bg) -->
    <path fill="white" d="M333.28,330.73c8.06-7.83,14.36-10.68,18.46-12.41,4.6-1.95,4.95,1.12,3.41,3.9-10.55,18.95,5.11,33.95,13.59,40.48,6.23,4.79,7.83,8.48,57.45,37.45l-14.08-26.93-58.99-118.67-42.43,81.95-59.2-70.57-60.31,68.89-44.21-76.36-73.13,147.32c8.52-6.54,24.83-26.11,52.23-44.38,8.27-5.51,21.53-15.66,41.1-19.69,22.18-4.57,9.79,3.91,3.91,9.25-48.33,43.9,23.49,57.95,34.71,68.23,3.07,2.81,2.54,6.18-.69,8.76-2.32,1.85-15,10.24-21.18,13.54-2.98,1.59-8.31,4.9-14.04,8.52h117.93c5.3-4.8,10.24-10.39,14.29-14.18,30.11-28.11-105.58-60.84-63.18-76.34,9.27-3.39,24.14-3.26,26.14-12.98,1.62-7.87.44-15.7-1.93-23.29-.1-.31-.16-.63-.33-1.28,40,33.94,73.32,64.3,112.19,98.01.08.07.15-.16.23-.24-16.11-19.81-39.28-51.63-55.42-71.47.25-.19,2.68-7,13.47-17.5Z"/>
  </g>

  <!-- Vertical divider -->
  <line x1="340" y1="110" x2="340" y2="520" stroke="#009DD6" stroke-width="1" stroke-opacity="0.25"/>

  <!-- ── Right side content ── -->

  <!-- "Wright Adventures" -->
  <text x="390" y="248"
    font-family="'Jost', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="76" font-weight="700" fill="white" letter-spacing="-1.5">Wright Adventures</text>

  <!-- Tagline -->
  <text x="394" y="306"
    font-family="'Jost', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="24" font-weight="400" fill="#009DD6" letter-spacing="3">EMPOWERING ORGANIZATIONS TO DO MORE</text>

  <!-- Horizontal rule -->
  <line x1="390" y1="344" x2="1120" y2="344" stroke="#009DD6" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Service pills -->
  <!-- Grow Your Funding -->
  <rect x="390" y="366" width="188" height="38" rx="4" fill="#009DD6" fill-opacity="0.12"/>
  <text x="484" y="390"
    font-family="'Jost', 'Inter', -apple-system, sans-serif"
    font-size="15" font-weight="500" fill="#009DD6" text-anchor="middle">Grow Your Funding</text>

  <!-- Build Your Programs -->
  <rect x="590" y="366" width="198" height="38" rx="4" fill="#4A7C59" fill-opacity="0.15"/>
  <text x="689" y="390"
    font-family="'Jost', 'Inter', -apple-system, sans-serif"
    font-size="15" font-weight="500" fill="#6FAB82" text-anchor="middle">Build Your Programs</text>

  <!-- Navigate Compliance -->
  <rect x="800" y="366" width="192" height="38" rx="4" fill="#B44B00" fill-opacity="0.15"/>
  <text x="896" y="390"
    font-family="'Jost', 'Inter', -apple-system, sans-serif"
    font-size="15" font-weight="500" fill="#D96B20" text-anchor="middle">Navigate Compliance</text>

  <!-- Scale With Technology -->
  <rect x="1004" y="366" width="196" height="38" rx="4" fill="#004667" fill-opacity="0.5" stroke="#009DD6" stroke-width="1" stroke-opacity="0.3"/>
  <text x="1102" y="390"
    font-family="'Jost', 'Inter', -apple-system, sans-serif"
    font-size="15" font-weight="500" fill="rgba(255,255,255,0.7)" text-anchor="middle">Scale With Technology</text>

  <!-- Description -->
  <text x="390" y="452"
    font-family="'Jost', 'Inter', -apple-system, sans-serif"
    font-size="18" font-weight="300" fill="rgba(255,255,255,0.65)" letter-spacing="0.2">Consulting, fundraising support, and AI-powered tools for community,</text>
  <text x="390" y="478"
    font-family="'Jost', 'Inter', -apple-system, sans-serif"
    font-size="18" font-weight="300" fill="rgba(255,255,255,0.65)" letter-spacing="0.2">environmental, and youth development organizations.</text>

  <!-- Bottom rule -->
  <line x1="390" y1="512" x2="1120" y2="512" stroke="white" stroke-width="1" stroke-opacity="0.1"/>

  <!-- Location · URL -->
  <text x="390" y="546"
    font-family="'Jost', 'Inter', -apple-system, sans-serif"
    font-size="16" fill="rgba(255,255,255,0.35)" letter-spacing="1">Denver, Colorado</text>
  <text x="1120" y="546"
    font-family="'Jost', 'Inter', -apple-system, sans-serif"
    font-size="16" fill="rgba(255,255,255,0.35)" text-anchor="end" letter-spacing="0.5">wrightadventures.org</text>
</svg>
